<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florida Real Estate Master Drill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* Instant feedback colors using standard CSS since @apply requires a build step */
    .correct-btn {
      background-color: #22c55e !important;
      color: white !important;
      border-color: #16a34a !important;
    }

    .wrong-btn {
      background-color: #ef4444 !important;
      color: white !important;
      border-color: #dc2626 !important;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeIn 0.4s ease forwards;
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex flex-col">

  <main class="flex-grow flex flex-col items-center justify-start px-4 pt-4 pb-2 overflow-y-auto main-content">

    <div id="main-container"
      class="bg-white p-3 pb-4 shadow-lg rounded-lg max-w-md w-full border border-gray-200 flex flex-col transition-all animate-in mb-4">

      <div class="flex justify-between items-center mb-3">
        <h1 class="text-xl font-bold text-slate-800 tracking-tight">FL Real Estate</h1>
        <div class="text-right">
          <div id="score" class="text-sm font-bold text-blue-600">Score: 0/0</div>
          <div id="timer" class="text-xs font-mono text-slate-500">00:00</div>
        </div>
      </div>

      <div class="w-full bg-gray-200 rounded-full h-2 mb-3">
        <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>

      <div id="quiz-box" class="flex flex-col">
        <div id="card-content">
          <span id="category-tag" class="text-xs font-semibold tracking-widest text-slate-400 uppercase">Category</span>
          <h2 id="question-text" class="text-lg font-semibold text-slate-700 mt-1 mb-3 leading-snug">
            Loading Exam Data...
          </h2>

          <div id="options-container" class="space-y-2 pb-2">
          </div>
        </div>

<div id="feedback-area" class="hidden mt-4 pt-4 border-t border-gray-100 text-center animate-in">
  <p id="feedback-text" class="text-sm font-bold mb-4"></p>
          <button id="next-btn"
            class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-6 rounded-lg transition-colors flex items-center justify-center gap-2">
            Next Question <i class="fa-solid fa-arrow-right text-xs"></i>
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-gray-800 text-white py-6 px-3 w-full mt-auto">
    <div class="container mx-auto flex flex-wrap items-center justify-between">
      <div class="w-full md:w-1/2 text-center md:text-left mb-4 md:mb-0">
        <p class="text-xs text-gray-400 md:text-sm">Copyright 2026 &copy; All Rights Reserved</p>
      </div>
      <div class="w-full md:w-1/2 flex justify-center md:justify-end gap-6 text-xl">
        <a href="https://www.facebook.com/codelikeagirl91" class="text-gray-400 hover:text-white transition-colors">
          <i class="fab fa-facebook-f"></i>
        </a>
        <a href="http://linkedin.com/in/lindsey-howard" class="text-gray-400 hover:text-white transition-colors">
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="https://github.com/codelikeagirl29" class="text-gray-400 hover:text-white transition-colors">
          <i class="fab fa-github"></i>
        </a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="assets/script.js"></script>
</body>

</html>
